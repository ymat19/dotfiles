# prefix settings
set -g prefix C-f
unbind C-b

# toggle prefix on/off with C-s
bind -n C-s if-shell -F '#{!=:#{prefix},None}' \
  'set -g prefix None ; bind -n C-f send-keys C-f' \
  'set -g prefix C-f ; unbind -n C-f'

# key bindings
bind v split-window -h
bind - split-window -v
bind x kill-pane
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Reloaded"
bind y set-window-option synchronize-panes
bind X kill-server

# enable color
set-option -g default-terminal screen-256color
set -g terminal-overrides 'xterm:colors=256'​

# https://qiita.com/mnishiguchi/items/b8526fecd69aa87d2f7e
# OS が Linux の時は xsel を使う
if-shell -b '[ "$(uname)" = "Linux" ]' {
  set -s copy-command "xsel --clipboard --input"
}

# OS が Darwin の時は pbcopy を使う
if-shell -b '[ "$(uname)" = "Darwin" ]' {
  set -s copy-command "pbcopy"
}

# copy-pipe と競合する場合があるので無効化
set -s set-clipboard on

# コピーモード中に Vim 風に v で選択範囲を定める
bind -Tcopy-mode-vi v send -X begin-selection

# コピーモード中に Vim 風に y で選択範囲をヤンクしてコピーモードを終了する
bind -Tcopy-mode-vi y send -X copy-pipe-and-cancel

set -g mouse on              # スクロールのために必要
bind -T root MouseDown1Pane if-shell -F "#{||:}" " " " "   # 左クリック無効化
#bind -T root MouseDrag1Pane if-shell -F "#{||:}" " " " "   # ドラッグ無効化
#bind -T root MouseUp1Pane   if-shell -F "#{||:}" " " " "   # クリック後の処理も無効化

# suggest by nvim checkhealth
set-option -sg escape-time 10

set -g history-limit 50000

set-option -g status-position top

# reset window-level overrides (e.g. left by Claude Code teammate)
set -uw pane-border-status
set -uw pane-border-style
set -uw pane-active-border-style

# override message styles for better readability
set -g message-style "bg=#414868,fg=#c0caf5"
set -g message-command-style "bg=#414868,fg=#c0caf5"

# workmux integration (dashboard/navigation only, sidebar replaced by tmux-agent-sidebar)
bind w display-popup -w90% -h90% -E "workmux dashboard"
bind o run-shell "workmux last-agent"

# tmux-agent-sidebar (prefix+e: current window, prefix+E: all windows)
set -g @plugin 'hiroppy/tmux-agent-sidebar'

# prefix+J / prefix+K: sidebar の並び順に沿って次/前のエージェントペインへ
# (J = 下 / 次、K = 上 / 前)。実装は configs/tmux-cycle-agent.sh。
bind J run-shell "~/.config/tmux/cycle-agent.sh next"
bind K run-shell "~/.config/tmux/cycle-agent.sh prev"

# prefix+Tab: tmux-agent-sidebar が各 pane に書き込む @pane_status / @pane_attention
# を横断し、最初に見つかった待機中エージェント (waiting / idle / attention あり) に飛ぶ。
# 候補が複数あっても list-panes -a 順の先頭 1 件のみ。
# 旧 `bind Tab run-shell "workmux last-done"` の置き換え。
bind Tab run-shell '
target=$(tmux list-panes -aF "#{?#{||:#{||:#{==:#{@pane_status},waiting},#{==:#{@pane_status},idle}},#{!=:#{@pane_attention},}},#{session_name}|#{window_id}|#{pane_id},}" | grep . | head -n 1)
[ -z "$target" ] && exit 0
s=$(echo "$target" | cut -d"|" -f1)
w=$(echo "$target" | cut -d"|" -f2)
p=$(echo "$target" | cut -d"|" -f3)
tmux switch-client -t "$s"
tmux select-window -t "$w"
tmux select-pane -t "$p"
'

# TPM (managed declaratively via nix in modules/tmux.nix)
run '~/.config/tmux/plugins/tpm/tpm'

# show pane synchronization status in status bar (center)
set -g status 2
set -g status-format[1] '#[align=centre]#{?pane_synchronized,#[bg=#f7768e]#[fg=#1a1b26]#[bold] 󰓦 SYNC MODE #[default],}#{?#{==:#{prefix},None},#[bg=#ff9e64]#[fg=#1a1b26]#[bold]  PREFIX DISABLED #[default],}'
